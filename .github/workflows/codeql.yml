name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml

      - name: Fetch libyaml
        run: |
          git clone --depth 1 --branch 0.2.5 https://github.com/yaml/libyaml.git /tmp/libyaml

      - name: Build (gcc for CodeQL tracing)
        run: |
          gcc -c -Wall -Wextra -O2 -DMD4X_USE_UTF8 \
            -DMD_VERSION_MAJOR=0 -DMD_VERSION_MINOR=0 -DMD_VERSION_RELEASE=18 \
            -DYAML_VERSION_STRING=\"0.2.5\" \
            -DYAML_VERSION_MAJOR=0 -DYAML_VERSION_MINOR=2 -DYAML_VERSION_PATCH=5 \
            -Isrc -Isrc/renderers -I/tmp/libyaml/include \
            src/md4x.c src/entity.c \
            src/renderers/md4x-html.c src/renderers/md4x-ast.c \
            src/renderers/md4x-ansi.c src/renderers/md4x-meta.c \
            src/renderers/md4x-text.c src/renderers/md4x-heal.c \
            src/cli/md4x-cli.c src/cli/cmdline.c \
            /tmp/libyaml/src/api.c /tmp/libyaml/src/reader.c \
            /tmp/libyaml/src/scanner.c /tmp/libyaml/src/parser.c

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
