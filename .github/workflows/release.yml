name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - name: Detect Zig version
        id: zig-version
        run: echo "version=$(grep -oP 'minimum_zig_version\s*=\s*"\K[^"]+' build.zig.zon)" >> "$GITHUB_OUTPUT"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      - name: Install JS dependencies
        run: bun install

      - name: Build
        run: zig build --verbose

      - name: Tests
        run: bun ./scripts/run-tests.ts

      - name: Test (vitest)
        run: bun vitest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Test (Rust)
        run: cargo test --workspace --locked
        working-directory: rust

      - name: Publish md4x-sys to crates.io
        if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish -p md4x-sys --locked --token "${CARGO_REGISTRY_TOKEN}"
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
        run: sleep 20

      - name: Publish md4x to crates.io
        if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish -p md4x --locked --token "${CARGO_REGISTRY_TOKEN}"
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/md4x
